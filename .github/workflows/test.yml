# #22: CI ゲート — テスト全パス必須 + コアモジュールのカバレッジ閾値(80%)。
# 外部プロセスラッパー(claude/ccusage/search/ollama/usage/history)はカバレッジ対象外
# (Node のカバレッジはロードされたファイルのみ報告するため、モック大量作成によるスコープ膨張を避ける)。
# lib 全体 80% は将来目標 (docs/CONTROL-PLANE.md 参照)。
name: test
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: unit tests (gate)
        run: node --test
      - name: coverage (core modules, 80% lines)
        run: npm run test:coverage
